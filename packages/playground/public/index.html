<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>TQL Playground</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="bundle.js"></script>
  </head>
  <body>
    <header>
      <h1>TQL Playground</h1>
    </header>
    <main>
      <form id="controls">
        <label for="language">Language</label>
        <select id="language">
          <option value="cpp">C++</option>
          <option value="c">C</option>
          <option value="go">Go</option>
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="rust">Rust</option>
          <option value="typescript">TypeScript</option>
          <option value="tsx">TSX</option>
          <option value="zig">Zig</option>
        </select>
        <button id="run" type="button">Run</button>
      </form>
      <section id="editors">
        <fieldset>
          <legend>Query</legend>
          <textarea id="query-source" rows="16" spellcheck="false">select function_definition.declarator</textarea>
        </fieldset>
        <fieldset>
          <legend>Target</legend>
          <textarea id="query-target" rows="16" spellcheck="false">int add(int a, int b) { return a + b; }
int main(void) { return add(1, 2); }</textarea>
        </fieldset>
      </section>
      <section id="results">
        <h2>Output</h2>
        <output id="stats"></output>
        <pre><code id="output"></code></pre>
      </section>
    </main>
  </body>
</html>
