on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: tql

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install
        working-directory: tql
        run: nix develop -c just install

      - name: Setup bin
        run: >
          mkdir -p "$HOME/.local/bin" &&
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build optimized engine
        working-directory: tql
        run: >
          nix develop -c
          just engine build
          --prefix "$HOME/.local"
          -Doptimize=ReleaseFast --release=fast

      - name: Checkout Linux source tree
        uses: actions/checkout@v6
        with:
          repository: torvalds/linux
          ref: 24d479d26b25bce5faea3ddd9fa8f3a6c3129ea7
          path: linux

      - name: Run query
        working-directory: tql
        run: |
          set -euo pipefail
          tql '
          with function_definition as @fn,
               @fn > function_declarator as @fn_decl,
               @fn_decl > identifier as @name,
               @fn.body as @body
          where any @c in @body >> call_expression:
                    any @callee in @c.function: @callee ~ /^(k|v|kv)(z|m|c|re)?alloc/ and
                any @g in @body >> goto_statement:
                    any @lbl in @g.label: @lbl ~ /^(err|out)(_\w+)?$/
          select { @name }
          ' "$GITHUB_WORKSPACE/linux" | jq .stats | tee results.json

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install
        run: nix develop -c just install

      - name: Build
        run: nix develop -c just build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install
        run: nix develop -c just install

      - name: Test
        run: nix develop -c just test
