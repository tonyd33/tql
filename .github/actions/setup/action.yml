name: Setup
description: Install Nix + load flake devShell into the job env via direnv.

inputs:
  path:
    description: Directory containing .envrc / flake.nix
    required: false
    default: .
  cachix-auth-token:
    description: Cachix auth token
    required: false

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - uses: cachix/cachix-action@v17
      with:
        name: tql
        authToken: ${{ inputs.cachix-auth-token }}

    - name: Load devShell into env
      shell: bash
      working-directory: ${{ inputs.path }}
      run: |
        nix profile install nixpkgs#direnv
        direnv allow .
        direnv export gha >> "$GITHUB_ENV"
